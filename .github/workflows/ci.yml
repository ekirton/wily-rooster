name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/poule

jobs:
  # ── Fast track: pure Python unit tests (no Docker, no Coq) ──────────
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run unit tests
        run: >-
          uv run pytest -m "not requires_coq"
          --ignore=test/test_neural_retrieval.py
          --ignore=test/test_neural_training.py
          --cov=poule --cov-report=xml -v

  # ── Build container image (parallel with unit-tests) ────────────────
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          load: true
          tags: |
            ${{ env.IMAGE }}:sha-${{ github.sha }}
            ${{ github.ref == 'refs/heads/main' && format('{0}:latest', env.IMAGE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image for integration tests
        run: docker save ${{ env.IMAGE }}:sha-${{ github.sha }} -o /tmp/poule-image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: poule-image
          path: /tmp/poule-image.tar
          retention-days: 1

  # ── Integration tests inside the container (needs Coq) ──────────────
  integration-tests:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: poule-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/poule-image.tar

      - name: Run integration tests
        run: |
          docker run --rm --entrypoint uv \
            ${{ env.IMAGE }}:sha-${{ github.sha }} \
            run pytest -m requires_coq -v
