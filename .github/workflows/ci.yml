name: CI – Unit Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run unit tests
        run: >-
          uv run pytest test/unit/
          --cov=Poule --cov-report=xml -v
